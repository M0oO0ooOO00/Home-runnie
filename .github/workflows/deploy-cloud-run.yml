name: Deploy to Google Cloud Run (Blue/Green)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast3 # 서울 리전 (필요시 변경)
  SERVICE_NAME: jikgwan-backend
  IMAGE_NAME: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/jikgwan-repo/backend

jobs:
  deploy-blue-green:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      # 1. GCP 인증 설정
      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. gcloud CLI 셋업
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. Docker 인증 (GCP Artifact Registry)
      - name: Docker Auth
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      # 4. 이미지 빌드 및 푸시 (GitHub SHA를 태그로 사용)
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f apps/backend/Dockerfile .
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      # 5. [Green 배포] 트래픽 없이 새 버전만 Cloud Run에 배포 (revision에 SHA 태그 부착)
      - name: Deploy to Cloud Run (No Traffic)
        id: deploy
        run: |
          IMAGE_TAG=${{ github.sha }}
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --region ${{ env.REGION }} \
            --no-traffic \
            --tag green-${IMAGE_TAG::7} \
            --platform managed \
            --allow-unauthenticated \
            --port 3030
            
      # 새 버전(Green) 헬스체크
      - name: Health Check New Revision
        run: |
          IMAGE_TAG=${{ github.sha }}
          
          # 새로 배포된 태그의 전용 URL 가져오기
          TAG_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.traffic[?(@.tag=='green-${IMAGE_TAG::7}')].url)")
          
          echo "Testing new revision at $TAG_URL/health"
          
          # 컨테이너가 뜨는 시간을 고려하여 5초마다 최대 10번 재시도 (최대 50초 대기)
          for i in {1..10}; do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TAG_URL/health")
            
            if [ "$STATUS_CODE" -eq 200 ]; then
              echo "✅ Health check passed! (Status: $STATUS_CODE)"
              exit 0
            fi
            
            echo "⏳ Health check failed (Status: $STATUS_CODE). Retrying in 5 seconds... ($i/10)"
            sleep 5
            
          done
          
          echo "❌ Health check failed after 10 attempts."
          exit 1

      # 6. [Blue/Green 스위칭] 문제 없으면 새로 배포된 리비전으로 트래픽 100% 전환
      - name: Route Traffic to New Revision
        run: |
          IMAGE_TAG=${{ github.sha }}
          # 최신 리비전 이름 가져오기
          REVISION=$(gcloud run revisions list --service ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --sort-by=~metadata.creationTimestamp --limit=1 --format="value(metadata.name)")

          echo "Switching 100% traffic to revision: $REVISION"

          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --to-revisions=$REVISION=100
