name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'apps/backend/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  build-and-test:
    name: Build and Check Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Drizzle migrations are committed
        env:
          MIGRATION_DIFF_RANGE: ${{ github.event.before }}...${{ github.sha }}
        run: sh ./scripts/check-drizzle-migration.sh ci

      - name: Type Check & Lint
        run: pnpm turbo run type-check lint --filter=@homerunnie/backend

      - name: Build Backend
        run: pnpm turbo run build --filter=@homerunnie/backend...

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: homerunnie-ecr
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR login password
        id: ecr-password
        run: |
          ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"
          echo "::add-mask::$ECR_PASSWORD"
          echo "password=$ECR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push image to Amazon ECR
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}"

          docker build \
            -t "$ECR_IMAGE:$IMAGE_TAG" \
            -t "$ECR_IMAGE:latest" \
            -f apps/backend/Dockerfile .

          docker push "$ECR_IMAGE:$IMAGE_TAG"
          docker push "$ECR_IMAGE:latest"

      - name: Copy .env to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'apps/backend/secret/prod.env'
          target: '~/homerunnie'
          strip_components: 3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          ECR_PASSWORD: ${{ steps.ecr-password.outputs.password }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,ECR_PASSWORD,IMAGE_TAG
          script: |
            set -e
            mkdir -p ~/homerunnie
            cd ~/homerunnie

            echo "$ECR_PASSWORD" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            cat <<EOF > docker-compose.prod.yaml
            services:
              backend:
                image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                container_name: homerunnie-backend
                ports:
                  - "3030:3030"
                env_file:
                  - prod.env
                environment:
                  - CI=true
                restart: always
            EOF

            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml run -T --rm backend node dist/scripts/migrate.js
            docker compose -f docker-compose.prod.yaml up -d
            docker image prune -f
