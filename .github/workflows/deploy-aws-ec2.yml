name: Backend CI/CD (AWS EC2)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'apps/backend/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  build-and-test:
    name: Build and Check Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Drizzle migrations are committed
        env:
          MIGRATION_DIFF_RANGE: ${{ github.event.before }}...${{ github.sha }}
        run: sh ./scripts/check-drizzle-migration.sh ci

      - name: Type Check & Lint
        run: pnpm turbo run type-check lint --filter=@homerunnie/backend

      - name: Build Backend
        run: pnpm turbo run build --filter=@homerunnie/backend...

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f apps/backend/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Copy .env to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'apps/backend/secret/prod.env'
          target: '~/jikgwan'
          strip_components: 3

      - name: Get ECR Login Password
        id: ecr-pass
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "password=$(aws ecr get-login-password --region $AWS_REGION)" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          ECR_PASSWORD: ${{ steps.ecr-pass.outputs.password }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,ECR_PASSWORD,IMAGE_TAG
          script: |
            set -e
            mkdir -p ~/jikgwan
            cd ~/jikgwan

            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin $ECR_REGISTRY

            cat <<EOF > docker-compose.prod.yaml
            services:
              backend:
                image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                container_name: jikgwan-backend
                ports:
                  - "3030:3030"
                env_file:
                  - prod.env
                environment:
                  - CI=true
                restart: always
            EOF
          
            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml run -T --rm backend node dist/scripts/migrate.js
            docker compose -f docker-compose.prod.yaml up -d
            docker image prune -f
