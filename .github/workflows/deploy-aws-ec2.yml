name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'apps/backend/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  build-and-test:
    name: Build and Check Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Drizzle migrations are committed
        env:
          MIGRATION_DIFF_RANGE: ${{ github.event.before }}...${{ github.sha }}
        run: sh ./scripts/check-drizzle-migration.sh ci

      - name: Type Check & Lint
        run: pnpm turbo run type-check lint --filter=@homerunnie/backend

      - name: Build Backend
        run: pnpm turbo run build --filter=@homerunnie/backend...

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag, and push image to Docker Hub
        env:
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $DOCKERHUB_REPOSITORY:$IMAGE_TAG -t $DOCKERHUB_REPOSITORY:latest -f apps/backend/Dockerfile .
          docker push $DOCKERHUB_REPOSITORY:$IMAGE_TAG
          docker push $DOCKERHUB_REPOSITORY:latest

      - name: Copy .env to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'apps/backend/secret/prod.env'
          target: '~/jikgwan'
          strip_components: 3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOCKERHUB_REPOSITORY,IMAGE_TAG
          script: |
            set -e
            mkdir -p ~/jikgwan
            cd ~/jikgwan

            echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

            cat <<EOF > docker-compose.prod.yaml
            services:
              backend:
                image: $DOCKERHUB_REPOSITORY:$IMAGE_TAG
                container_name: jikgwan-backend
                ports:
                  - "3030:3030"
                env_file:
                  - prod.env
                environment:
                  - CI=true
                restart: always
            EOF

            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml run -T --rm backend node dist/scripts/migrate.js
            docker compose -f docker-compose.prod.yaml up -d
            docker image prune -f
